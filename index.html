    <style>
        :root {
            --p1: #ffafbd;
            --p2: #ffc3a0;
            --p3: #ee9ca7;
            --p4: #ffdde1;
            --deep-pink: #c9184a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* خلفية متحركة بتدريج ألوان البينك */
            background: linear-gradient(-45deg, var(--p1), var(--p2), var(--p3), var(--p4));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* حاوية الجزيئات المتساقطة */
        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            top: -20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* الحاوية الرئيسية */
        .card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
        }

        .heart {
            font-size: clamp(40px, 10vw, 60px);
            animation: pulse 1.5s infinite;
            display: inline-block;
            margin-bottom: 10px;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px var(--deep-pink)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 15px var(--deep-pink)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--deep-pink)); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--deep-pink);
            font-size: clamp(2rem, 8vw, 3rem);
            margin-bottom: 10px;
        }

        .since-date {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            background: rgba(255, 255, 255, 0.4);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* تنسيق العداد المتقدم */
        .timer-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 10px;
            border-radius: 18px;
            min-width: 80px;
            flex: 1 1 calc(33.33% - 12px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: none; /* سيظهر بواسطة JS فقط إذا كان القيمة > 0 */
            transition: all 0.3s ease;
        }

        .time-box span {
            display: block;
        }

        .num {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--deep-pink);
        }

        .label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* قسم الرسالة */
        .message-box {
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            position: relative;
        }

        #quote {
            font-size: clamp(0.95rem, 4vw, 1.1rem);
            color: #444;
            font-style: italic;
            line-height: 1.6;
            transition: opacity 0.8s ease;
        }

        /* تجاوب الشاشات الصغيرة جداً */
        @media (max-width: 360px) {
            .time-box { flex: 1 1 calc(50% - 12px); }
        }
    </style>

        // تحديث الرسالة كل ساعة بشكل غير مكرر
        function updateHourlyMessage() {
            // نستخدم عدد الساعات منذ بداية التاريخ (Epoch) لضمان تغير الرسالة كل ساعة
            const hoursSinceEpoch = Math.floor(Date.now() / (1000 * 60 * 60));
            const index = hoursSinceEpoch % messages.length;
            
            const quoteEl = document.getElementById("quote");
            quoteEl.style.opacity = 0;
            
            setTimeout(() => {
                quoteEl.innerText = `"${messages[index]}"`;
                quoteEl.style.opacity = 1;
            }, 800);
        }

        // إنشاء القلوب المتساقطة
        function createParticle() {
            const particles = ['❤️', '✨', '🌸', '💖', '🤍'];
            const p = document.createElement('div');
            p.classList.add('particle');
            p.innerText = particles[Math.floor(Math.random() * particles.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 15 + 10) + 'px';
            p.style.animationDuration = (Math.random() * 3 + 4) + 's';
            p.style.opacity = Math.random() * 0.5 + 0.3;
            document.getElementById('particles').appendChild(p);
            
            setTimeout(() => p.remove(), 7000);
        }

        // بدء التشغيل
        setInterval(updateCounter, 1000);
        setInterval(createParticle, 500);
        setInterval(updateHourlyMessage, 60000); // يفحص كل دقيقة إذا دخلت ساعة جديدة

        updateCounter();
        updateHourlyMessage();
