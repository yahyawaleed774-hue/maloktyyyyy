<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto; 
            padding: 20px;
        }

        /* أنيميشن القلوب */
        .hearts-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .heart-fall {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
        }

        /* الصورة كاملة */
        .image-container {
            width: 100%;
            height: auto;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 3px solid white;
        }
        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* تنسيق الكلمات للظهور التدريجي */
        .animate-text span {
            display: inline-block;
            opacity: 0;
            transform: translateY(10px);
            filter: blur(5px);
            animation: revealWord 0.5s forwards;
            margin-right: 5px; /* مسافة بين الكلمات */
        }

        @keyframes revealWord {
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        h3 {
            font-size: 1.7rem;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        p {
            font-size: 1.1rem;
            color: #fff;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #fff;
            opacity: 0; /* تختفي في البداية */
            animation: fadeIn 1s forwards;
            animation-delay: 4s; /* تظهر بعد انتهاء الكلام */
        }

        .pulse-heart {
            font-size: 35px;
            display: inline-block;
            animation: pulse 1.5s infinite;
            margin-top: 10px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* دعم الهواتف */
        @media (max-width: 400px) {
            .card { padding: 15px; }
            h3 { font-size: 1.4rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="hearts-container" id="hearts"></div>

    <div class="card">
        <div class="image-container">
            <img src="img/WhatsApp Image 2026-06-20 at 11.38.57 PM.jpeg" alt="Our Memory">
        </div>

        <h3 id="title" class="animate-text">Maloktyyyy You Are My World</h3>
        
        <p id="message" class="animate-text">
            Every moment with you is like a beautiful dream come true. You are the best thing that ever happened to me.
        </p>

        <div class="pulse-heart">❤️</div>
        <div class="signature">Forever Yours</div>
    </div>

    <script>
        // دالة لتقسيم النص إلى كلمات وتطبيق الأنيميشن
        function animateText(elementId, delayOffset = 0) {
            const el = document.getElementById(elementId);
            const words = el.innerText.split(" ");
            el.innerHTML = ""; // مسح النص الأصلي

            words.forEach((word, index) => {
                const span = document.createElement("span");
                span.innerText = word;
                // تأخير ظهور كل كلمة بناءً على ترتيبها
                span.style.animationDelay = `${(index * 0.2) + delayOffset}s`;
                el.appendChild(span);
            });
            return words.length * 0.2; // إرجاع الوقت الإجمالي المستغرق
        }

        // تشغيل الأنيميشن عند تحميل الصفحة
        window.onload = () => {
            const titleDuration = animateText("title", 0.5); // يبدأ بعد نصف ثانية
            animateText("message", titleDuration + 0.5); // يبدأ بعد انتهاء العنوان
        };

        // توليد القلوب
        const container = document.getElementById('hearts');
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-fall');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.opacity = Math.random() * 0.5 + 0.3;
            heart.style.fontSize = Math.random() * 15 + 10 + 'px';
            container.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 400);
    </script>

</body>
</html>
